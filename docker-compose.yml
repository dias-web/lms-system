services:
  postgres:
    image: postgres:16-alpine
    container_name: lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
      POSTGRES_DB: ${POSTGRES_DB:-lms_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms} -d ${POSTGRES_DB:-lms_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lms-network

  app:
    image: yamaha226/lms-system:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: missing
    container_name: lms-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: ${APP_PORT:-8080}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-lms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
      POSTGRES_DB: ${POSTGRES_DB:-lms_db}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - lms-network

  keycloak-db:
    image: postgres:16-alpine
    container_name: lms-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KC_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak_password}
      POSTGRES_DB: ${KC_DB_NAME:-keycloak_db}
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak} -d ${KC_DB_NAME:-keycloak_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lms-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: lms-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      # Admin console credentials (master realm)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      # Database
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KC_DB_NAME:-keycloak_db}
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak_password}
      # HTTP / health
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KC_PORT:-8081}:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    networks:
      - lms-network

volumes:
  postgres_data:
  keycloak_data:

networks:
  lms-network:
    driver: bridge