basePath: /
definitions:
  ChangePasswordRequest:
    properties:
      new_password:
        example: NewPass456
        minLength: 6
        type: string
      old_password:
        example: OldPass123
        type: string
    required:
    - new_password
    - old_password
    type: object
  LoginRequest:
    properties:
      password:
        example: admin123
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOi...
        type: string
    required:
    - refresh_token
    type: object
  RegisterRequest:
    properties:
      email:
        example: jdoe@lms.local
        type: string
      first_name:
        example: John
        maxLength: 255
        type: string
      last_name:
        example: Doe
        maxLength: 255
        type: string
      password:
        example: Str0ngPass
        minLength: 6
        type: string
      role:
        enum:
        - ROLE_ADMIN
        - ROLE_TEACHER
        - ROLE_USER
        example: ROLE_USER
        type: string
      username:
        example: jdoe
        maxLength: 255
        minLength: 2
        type: string
    required:
    - email
    - password
    - role
    - username
    type: object
  TokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        example: 300
        type: integer
      refresh_expires_in:
        example: 604800
        type: integer
      refresh_token:
        type: string
      token_type:
        example: Bearer
        type: string
    type: object
  UpdateProfileRequest:
    properties:
      email:
        example: new@lms.local
        type: string
      first_name:
        example: John
        maxLength: 255
        type: string
      last_name:
        example: Doe
        maxLength: 255
        type: string
    type: object
  UserResponse:
    properties:
      email:
        example: jdoe@lms.local
        type: string
      first_name:
        example: John
        type: string
      id:
        example: b1c2d3e4-....
        type: string
      last_name:
        example: Doe
        type: string
      role:
        example: ROLE_USER
        type: string
      username:
        example: jdoe
        type: string
    type: object
  dto.AttachmentResponse:
    properties:
      content_type:
        example: application/pdf
        type: string
      created_at:
        type: string
      file_name:
        example: syllabus.pdf
        type: string
      id:
        example: 1
        type: integer
      lesson_id:
        example: 1
        type: integer
      size:
        example: 20480
        type: integer
      updated_at:
        type: string
    type: object
  dto.ChapterResponse:
    properties:
      course_id:
        example: 1
        type: integer
      created_at:
        type: string
      description:
        example: Basic types, declaration, scope.
        type: string
      id:
        example: 1
        type: integer
      lessons:
        items:
          $ref: '#/definitions/dto.LessonResponse'
        type: array
      name:
        example: Variables and Types
        type: string
      order:
        example: 1
        type: integer
      updated_at:
        type: string
    type: object
  dto.CourseResponse:
    properties:
      chapters:
        items:
          $ref: '#/definitions/dto.ChapterResponse'
        type: array
      created_at:
        type: string
      description:
        example: Introductory course on Go programming.
        type: string
      id:
        example: 1
        type: integer
      name:
        example: Golang Developer
        type: string
      updated_at:
        type: string
    type: object
  dto.CreateChapterRequest:
    properties:
      course_id:
        example: 1
        type: integer
      description:
        example: Basic types, declaration, scope.
        maxLength: 10000
        type: string
      name:
        example: Variables and Types
        maxLength: 255
        minLength: 2
        type: string
      order:
        example: 1
        minimum: 0
        type: integer
    required:
    - course_id
    - name
    type: object
  dto.CreateCourseRequest:
    properties:
      description:
        example: Introductory course on Go programming.
        maxLength: 10000
        type: string
      name:
        example: Golang Developer
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.CreateLessonRequest:
    properties:
      chapter_id:
        example: 1
        type: integer
      content:
        example: In Go, var declares one or more variables...
        type: string
      description:
        example: How to declare variables and infer types.
        maxLength: 10000
        type: string
      name:
        example: Declaring variables with var
        maxLength: 255
        minLength: 2
        type: string
      order:
        example: 1
        minimum: 0
        type: integer
    required:
    - chapter_id
    - name
    type: object
  dto.ErrorBody:
    properties:
      code:
        example: COURSE_NOT_FOUND
        type: string
      message:
        example: course not found
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/dto.ErrorBody'
    type: object
  dto.LessonResponse:
    properties:
      chapter_id:
        example: 1
        type: integer
      content:
        example: In Go, var declares one or more variables...
        type: string
      created_at:
        type: string
      description:
        example: How to declare variables and infer types.
        type: string
      id:
        example: 1
        type: integer
      name:
        example: Declaring variables with var
        type: string
      order:
        example: 1
        type: integer
      updated_at:
        type: string
    type: object
  dto.UpdateChapterRequest:
    properties:
      description:
        example: Basic types, declaration, scope, examples.
        maxLength: 10000
        type: string
      name:
        example: Variables and Types (revised)
        maxLength: 255
        minLength: 2
        type: string
      order:
        example: 1
        minimum: 0
        type: integer
    required:
    - name
    type: object
  dto.UpdateCourseRequest:
    properties:
      description:
        example: Refreshed course on Go programming.
        maxLength: 10000
        type: string
      name:
        example: Golang Developer (v2)
        maxLength: 255
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.UpdateLessonRequest:
    properties:
      content:
        example: Updated lesson body...
        type: string
      description:
        example: Updated explanation.
        maxLength: 10000
        type: string
      name:
        example: Declaring variables with var (revised)
        maxLength: 255
        minLength: 2
        type: string
      order:
        example: 1
        minimum: 0
        type: integer
    required:
    - name
    type: object
  handler.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: |-
    REST API for managing Courses, Chapters and Lessons in the LMS platform.
    All mutating endpoints (POST/PUT/DELETE) emit structured logs via logrus.
    Errors are returned in a unified shape: {"error":{"code":"...","message":"..."}}.
  title: LMS Main Service API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: |-
        Exchanges username and password for a JWT access token (5 min)
        and a refresh token (168 h), both issued by Keycloak.
      parameters:
      - description: User credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/TokenResponse'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Invalid username or password
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Authenticate and obtain tokens
      tags:
      - auth
  /auth/password:
    put:
      consumes:
      - application/json
      description: |-
        Changes the authenticated user's password. The current
        password must be supplied and is verified first.
      parameters:
      - description: Old and new passwords
        in: body
        name: passwords
        required: true
        schema:
          $ref: '#/definitions/ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Password changed
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing token or wrong current password
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change own password
      tags:
      - auth
  /auth/profile:
    put:
      consumes:
      - application/json
      description: |-
        Updates the authenticated user's email and name. Roles cannot
        be changed here — only an admin can assign roles.
      parameters:
      - description: Profile fields
        in: body
        name: profile
        required: true
        schema:
          $ref: '#/definitions/UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/UserResponse'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Email already taken
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update own profile
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: |-
        Exchanges a valid refresh token for a new access/refresh token
        pair. Used when the 5-minute access token expires.
      parameters:
      - description: Refresh token
        in: body
        name: token
        required: true
        schema:
          $ref: '#/definitions/RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/TokenResponse'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Refresh access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: |-
        Creates a Keycloak user and assigns a realm role. Requires a
        valid token carrying ROLE_ADMIN.
      parameters:
      - description: New user
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/UserResponse'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Caller is not an admin
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Username or email already taken
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Register a new user (admin only)
      tags:
      - auth
  /chapters:
    post:
      consumes:
      - application/json
      description: Creates a chapter under an existing course. course_id is required
        and validated. Requires ROLE_ADMIN.
      parameters:
      - description: Chapter payload
        in: body
        name: chapter
        required: true
        schema:
          $ref: '#/definitions/dto.CreateChapterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ChapterResponse'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Requires ROLE_ADMIN
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Parent course not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new chapter (admin only)
      tags:
      - chapters
  /chapters/{id}:
    delete:
      description: Deletes a chapter. All lessons are cascade-deleted. Requires ROLE_ADMIN.
      parameters:
      - description: Chapter ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: Deleted
        "400":
          description: Invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Requires ROLE_ADMIN
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Chapter not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a chapter (admin only)
      tags:
      - chapters
    get:
      description: Returns a chapter together with its lessons, ordered by lesson.order.
      parameters:
      - description: Chapter ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ChapterResponse'
        "400":
          description: Invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Chapter not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get chapter by ID (with lessons)
      tags:
      - chapters
    put:
      consumes:
      - application/json
      description: Updates chapter name, description and order. course_id cannot be
        changed via PUT. Requires ROLE_ADMIN.
      parameters:
      - description: Chapter ID
        in: path
        name: id
        required: true
        type: integer
      - description: Chapter payload
        in: body
        name: chapter
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateChapterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ChapterResponse'
        "400":
          description: Validation failed or invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Requires ROLE_ADMIN
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Chapter not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update an existing chapter (admin only)
      tags:
      - chapters
  /chapters/{id}/lessons:
    get:
      description: Returns all lessons of the given chapter, ordered by lesson.order.
      parameters:
      - description: Chapter ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.LessonResponse'
            type: array
        "400":
          description: Invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Chapter not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List lessons of a chapter
      tags:
      - lessons
  /courses:
    get:
      description: Returns a flat list of courses without nested chapters.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CourseResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List all courses
      tags:
      - courses
    post:
      consumes:
      - application/json
      description: Creates a course. Name length 2..255. Description up to 10000 chars.
        Requires ROLE_ADMIN.
      parameters:
      - description: Course payload
        in: body
        name: course
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCourseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CourseResponse'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Requires ROLE_ADMIN
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new course (admin only)
      tags:
      - courses
  /courses/{id}:
    delete:
      description: Deletes a course. All chapters and lessons are cascade-deleted.
        Requires ROLE_ADMIN.
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: Deleted
        "400":
          description: Invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Requires ROLE_ADMIN
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Course not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a course (admin only)
      tags:
      - courses
    get:
      description: Returns a course together with its chapters, ordered by chapter.order.
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CourseResponse'
        "400":
          description: Invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Course not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get course by ID (with chapters)
      tags:
      - courses
    put:
      consumes:
      - application/json
      description: Replaces course name and description. Timestamps are preserved.
        Requires ROLE_ADMIN.
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      - description: Course payload
        in: body
        name: course
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCourseRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CourseResponse'
        "400":
          description: Validation failed or invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Requires ROLE_ADMIN
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Course not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update an existing course (admin only)
      tags:
      - courses
  /courses/{id}/chapters:
    get:
      description: Returns all chapters of the given course, ordered by chapter.order.
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ChapterResponse'
            type: array
        "400":
          description: Invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Course not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List chapters of a course
      tags:
      - chapters
  /download/{id}:
    get:
      description: Streams the stored file by attachment ID. Requires a valid token
        (any authenticated user).
      parameters:
      - description: Attachment ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Attachment not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download a file attachment
      tags:
      - attachments
  /health:
    get:
      description: Liveness probe. Returns 200 OK when the service is running.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.HealthResponse'
      summary: Health check
      tags:
      - health
  /lessons:
    post:
      consumes:
      - application/json
      description: Creates a lesson under an existing chapter. chapter_id is required
        and validated. Requires ROLE_ADMIN.
      parameters:
      - description: Lesson payload
        in: body
        name: lesson
        required: true
        schema:
          $ref: '#/definitions/dto.CreateLessonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.LessonResponse'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Requires ROLE_ADMIN
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Parent chapter not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new lesson (admin only)
      tags:
      - lessons
  /lessons/{id}:
    delete:
      description: Deletes a single lesson. Requires ROLE_ADMIN.
      parameters:
      - description: Lesson ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: Deleted
        "400":
          description: Invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
